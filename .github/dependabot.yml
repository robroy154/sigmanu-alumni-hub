version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Group all minor and patch updates into a single PR per group.
    # Major updates are intentionally excluded — they require manual review.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Ignore major version bumps — they land as individual PRs but are not
    # auto-merged (the workflow below gates on semver-minor/semver-patch).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
